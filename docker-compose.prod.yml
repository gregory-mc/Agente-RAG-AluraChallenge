services:
  techie:
    image: ghcr.io/gregory-mc/techie-asistente:latest
    container_name: techie
    ports:
      - "8000:8000"
    environment:
      # Se asume que COHERE_API_KEY está definida en el archivo .env de la VM
      COHERE_API_KEY: ${COHERE_API_KEY}
      RAG_GENERATION_PROVIDER: cohere
    restart: unless-stopped
    volumes:
      - techie-logs:/app/data/logs
      - techie-feedback:/app/data/feedback

volumes:
  techie-logs:
  techie-feedback:
