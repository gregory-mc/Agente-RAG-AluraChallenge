# CI/CD — construye la imagen y la publica en OCI Container Registry (OCIR).
# Issue #7. Secrets requeridos (Settings → Secrets and variables → Actions):
#   OCIR_REGION     ej. iad.ocir.io  (host del registry de tu región)
#   OCIR_NAMESPACE  el "object storage namespace" del tenancy
#   OCIR_USERNAME   <namespace>/<usuario>  (con dominio: <namespace>/<dominio>/<usuario>)
#   OCIR_TOKEN      Auth Token del usuario (User Settings → Auth Tokens)
# La imagen queda como: <OCIR_REGION>/<OCIR_NAMESPACE>/techie-asistente:{latest,<sha>}
name: Build & push to OCIR

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**", "**/*.md"]
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.OCIR_REGION }}/${{ secrets.OCIR_NAMESPACE }}/techie-asistente

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGION }}
          username: ${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------------------
  # OPCIONAL: recrear la Container Instance con la imagen nueva (deploy).
  # Requiere configurar la OCI CLI vía secrets (OCI_CLI_USER, OCI_CLI_TENANCY,
  # OCI_CLI_FINGERPRINT, OCI_CLI_KEY_CONTENT, OCI_CLI_REGION) y el OCID de la
  # instancia. Descomentar y completar cuando la instancia exista.
